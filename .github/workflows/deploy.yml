name: Deploy to DisCloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Code holen
        uses: actions/checkout@v4

      - name: 📦 ZIP erstellen
        run: |
          zip -r bot.zip bot.py requirements.txt discloud.config
          echo "✅ ZIP erstellt"

      - name: 🚀 Zu DisCloud deployen
        run: |
          curl -X PUT "https://api.discloud.app/v2/app/${{ secrets.DISCLOUD_APP_ID }}/upload" \
            -H "api-token: ${{ secrets.DISCLOUD_TOKEN }}" \
            -F "file=@bot.zip"
          echo "✅ Deploy abgeschlossen"
